name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 时间 0:00 运行
  workflow_dispatch: # 允许手动触发

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }} # 仅在 fork 仓库中运行

    steps:
      # Step 1: 检出当前仓库代码
      - name: Checkout target repo
        uses: actions/checkout@v6

      # Step 2: 同步上游仓库的更新
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: maillab/cloud-mail
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

      # Step 3: 同步失败时的错误提示（适用于一般冲突场景）
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 自动同步失败，可能是因为："
          echo "  1. 您的 fork 仓库与上游仓库存在代码冲突"
          echo "  2. 网络或权限问题"
          echo ""
          echo "[Solution] 请手动解决冲突："
          echo "  1. 在 GitHub 上点击 'Sync fork' 按钮"
          echo "  2. 或使用命令行："
          echo "     git remote add upstream https://github.com/maillab/cloud-mail.git"
          echo "     git fetch upstream"
          echo "     git merge upstream/main"
          echo "     解决冲突后 git push"
          exit 1

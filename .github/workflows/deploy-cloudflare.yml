名称：🚀向Cloudflare Workers部署云邮件

关于：
  推：
    分支：[ 主线 ]
    路径：
      - “邮差/**”
      - “Mail-Vue/**”
  workflow_dispatch：

职位：
  部署-云-邮件：
    名称：🏗️构建与部署
    runs-on： ubuntu-latest

    环境：
      姓名：${{ secrets.NAME || vars.NAME ||'云邮件'}}
      CUSTOM_DOMAIN：${{ 秘密。CUSTOM_DOMAIN ||瓦尔斯。CUSTOM_DOMAIN }}
      领域：${{ 秘密。领域 ||瓦尔斯。领域 }}
      管理员：${{ 秘密。管理员 ||瓦尔斯。管理员 }}
      JWT_SECRET：${{ 秘密。JWT_SECRET ||瓦尔斯。JWT_SECRET }}
      CLOUDFLARE_API_TOKEN：${{ 秘密。CLOUDFLARE_API_TOKEN ||瓦尔斯。CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID：${{ 秘密。CLOUDFLARE_ACCOUNT_ID ||瓦尔斯。CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID：${{ 秘密。D1_DATABASE_ID ||瓦尔斯。D1_DATABASE_ID }}
      KV_NAMESPACE_ID：${{ 秘密。KV_NAMESPACE_ID ||瓦尔斯。KV_NAMESPACE_ID }}
      R2_BUCKET_NAME：${{ 秘密。R2_BUCKET_NAME ||瓦尔斯。R2_BUCKET_NAME }}
      PROJECT_LINK：${{ 秘密。PROJECT_LINK ||瓦尔斯。PROJECT_LINK }}
      AI_MODEL：${{ 秘密。AI_MODEL ||瓦尔斯。AI_MODEL ||'@cf/meta/llama-3.1-8b-instruct' }}
      CLOUDFLARE_EMAIL：${{ 秘密。CF_EMAIL ||瓦尔斯。CF_EMAIL ||错误 }}
      ANALYSIS_CACHE：${{ 秘密。ANALYSIS_CACHE ||瓦尔斯。ANALYSIS_CACHE ||错误 }}
      LINUXDO_CLIENT_ID：${{ 秘密。LINUXDO_CLIENT_ID ||瓦尔斯。LINUXDO_CLIENT_ID }}
      LINUXDO_CLIENT_SECRET：${{ 秘密。LINUXDO_CLIENT_SECRET ||瓦尔斯。LINUXDO_CLIENT_SECRET }}
      LINUXDO_CALLBACK_URL：${{ 秘密。LINUXDO_CALLBACK_URL ||瓦尔斯。LINUXDO_CALLBACK_URL }}
      LINUXDO_SWITCH：${{ 秘密。LINUXDO_SWITCH ||瓦尔斯。LINUXDO_SWITCH }}


    输出：
      worker_url： ${{ steps.deploy.outputs.worker_url }}


    步骤：
      - name： 🚚 检出代码仓库 / Checkout repository
        用途：行动/checkout@v4

      - 名称：⚙设置 pnpm / 设置 pnpm
        用途：PNPM/Action-setup@v4.1.0
        与：
          版本：9

      - 名称：⚙设置 Node.js / 设置 Node.js
        用途：动作/设置node@v4
        与：
          节点版本：“22”
          缓存：“PNPM”
          cache-dependency-path：“./mail-worker/pnpm-lock.yaml”

      - name： 📦 安装依赖 / 安装依赖
        run： PNPM 安装 --frozen-lockfile
        工作目录：./Mail-Worker

      - 名称：📡禁用 Wrangler 遥测 / 禁用 Wrangler 遥测
        工作目录：./Mail-Worker
        运行：PNPM Wrangler 禁用遥测

      - 名称：🛠️设置环境 / 设置环境
        工作目录：./Mail-Worker
        运行：|
          
回声“🔐启动环境设置......”
          
如果 [ -z “$JWT_SECRET” ] ||grep -q '[？%#/\\]' <<< “$JWT_SECRET”;则
回声“❌ JWT_SECRET变量为空或包含无效字符（？， %， #， /， \\）。”
出口1
Fi
          
如果！jq -e '类型 == “array”' <<< “$DOMAIN” ;则
echo “❌ DOMAIN 变量必须是 JSON 数组（例如 [\”example.com\“]）。”
出口1
Fi
          
如果 [ -z “$ADMIN” ];则
echo “❌ ADMIN 变量不能空。”
出口1
Fi
          
如果 [ -z “$CLOUDFLARE_ACCOUNT_ID” ];则
回声：“❌ CLOUDFLARE_ACCOUNT_ID变量不可能空。”
出口1
Fi
          
如果 [ -z “$CLOUDFLARE_API_TOKEN” ];则
回声：“❌ CLOUDFLARE_API_TOKEN变量不可能是空的。”
出口1
Fi
          
如果 [ -z “$CUSTOM_DOMAIN” ];则
回声“：：警告：：CUSTOM_DOMAIN变量未被设置。”
Fi
          
CONFIG_FILE=“wrangler-action.toml”
          
如果 [ -z “$R 2_BUCKET_NAME” ];则
sed -i '/\[\[r2_buckets\]\]/，/^$/d' “$CONFIG_FILE”
Fi
          
如果 [ -z “$PROJECT_LINK” ];则
sed -i '/^project_link = /d' “$CONFIG_FILE”
Fi
          
如果 [ -z “$LINUXDO_CLIENT_ID” ] ||[ -z “$LINUXDO_CLIENT_SECRET” ];则
sed -i '/^linuxdo_client_id = /，/^linuxdo_switch = /d' “$CONFIG_FILE”
Fi
          
如果 [ -z “$CUSTOM_DOMAIN” ];则
sed -i '/\[\[路线\]\]/，/^$/d' “$CONFIG_FILE”
Fi
          
如果 [ “$（printf '%s' ”$CLOUDFLARE_EMAIL“ |tr '[：upper：]' '[：lower：]'）“ = ”真“ ];则
cat >> “$CONFIG_FILE” <<'EOF'
[[send_email]]
name = “电子邮件”
EOF
Fi
sed -i “s|\${NAME}|${NAME}|g” “$CONFIG_FILE”
sed -i “s|\${CUSTOM_DOMAIN}|${CUSTOM_DOMAIN}|g” “$CONFIG_FILE”
sed -i “s|\”\${DOMAIN}\“|${DOMAIN}|g” “$CONFIG_FILE”
sed -i “s|\${ADMIN}|${ADMIN}|g” “$CONFIG_FILE”
sed -i “s|\${JWT_SECRET}|${JWT_SECRET}|g” “$CONFIG_FILE”
sed -i “s|\${R2_BUCKET_NAME}|${R2_BUCKET_NAME}|g” “$CONFIG_FILE”
sed -i “s|\${PROJECT_LINK}|${PROJECT_LINK}|g” “$CONFIG_FILE”
sed -i “s|\${ANALYSIS_CACHE}|${ANALYSIS_CACHE}|g” “$CONFIG_FILE”
sed -i “s|\${AI_MODEL}|${AI_MODEL}|g” “$CONFIG_FILE”
sed -i “s|\${LINUXDO_CLIENT_ID}|${LINUXDO_CLIENT_ID}|g” “$CONFIG_FILE”
sed -i “s|\${LINUXDO_CLIENT_SECRET}|${LINUXDO_CLIENT_SECRET}|g” “$CONFIG_FILE”
sed -i “s|\${LINUXDO_CALLBACK_URL}|${LINUXDO_CALLBACK_URL}|g” “$CONFIG_FILE”
sed -i “s|\${LINUXDO_SWITCH}|${LINUXDO_SWITCH}|g” “$CONFIG_FILE”
          
回声：“✅环境设置完成。”
      - name： ⚡ 设置KV数据库 / Set up KV database
        工作目录：./Mail-Worker
        运行：|
          
CONFIG_FILE=“wrangler-action.toml”
          
如果 [ -n “$KV_NAMESPACE_ID” ];则
sed -i “s|\${KV_NAMESPACE_ID}|${KV_NAMESPACE_ID}|g” “$CONFIG_FILE”
echo “✅利用环境变量中的数据库。”
出口0
Fi
          
回声“🔍检查数据库是否存在......”
          
集合+e
KV_LIST=$（PNPM Wrangler KV 命名空间列表 2>&1）
STATUS=$？
集合 -e
          
如果 [ $STATUS -ne 0 ];则
回声“$KV_LIST”
出口1
Fi
                  
如果回声“$KV_LIST” |JQ -e “。[] |select（.title == \“$NAME\”）“ >/dev/null;则
回声“✅数据库$NAME已经存在了。”
KV_ID=$（echo “$KV_LIST” | jq -r “.[] |select（.title == \“$NAME\”） | .id“）
回声“KV_NAMESPACE_ID：$KV_ID”
否则
echo“⚠️数据库$NAME不存在。开始创造......”
PNPM Wrangler KV 命名空间创建$NAME
KV_LIST=$（PNPM Wrangler KV 命名空间列表）
KV_ID=$（echo “$KV_LIST” | jq -r “.[] |select（.title == \“$NAME\”） | .id“）
Fi
          
sed -i “s|\${KV_NAMESPACE_ID}|$KV_ID|g” “$CONFIG_FILE”
回声“✅设置完成。”
      - name： 🐬 设置D1数据库 / Set up D1 database
        工作目录：./Mail-Worker
        运行：|
          
CONFIG_FILE=“wrangler-action.toml”
          
如果 [ -n “$D 1_DATABASE_ID” ];则
sed -i “s|\${D1_DATABASE_ID}|${D1_DATABASE_ID}|g” “$CONFIG_FILE”
echo “✅利用环境变量中的数据库。”
出口0
Fi
          
回声“🔍检查数据库是否存在......”
          
集合+e
DB_LIST=$（PNPM wrangler D1 List --JSON 2>&1）
STATUS=$？
集合 -e
          
如果 [ $STATUS -ne 0 ];则
回声“$DB_LIST”
出口1
Fi
          
如果回声“$DB_LIST” |JQ -e “。[] |select（.name == \“$NAME\”）“ >/dev/null;则
回声“✅数据库$NAME已经存在了。”
D1_ID=$（echo “$DB_LIST” | jq -r “.[] |select（.name == \“$NAME\”） | .uuid“）
回声“D1_DATABASE_ID：$D 1_ID”
否则
echo“⚠️数据库$NAME不存在。开始创造......”
PNPM Wrangler D1 创建$NAME
DB_LIST=$（PNPM wrangler D1 List --json）
D1_ID=$（echo “$DB_LIST” | jq -r “.[] |select（.name == \“$NAME\”） | .uuid“）
Fi
          
sed -i “s|\${D1_DATABASE_ID}|$D 1_ID|g” “$CONFIG_FILE”
回声“✅设置完成。”
      - 名称：🚀开始部署 / 开始部署
        ID：部署
        工作目录：./Mail-Worker
        运行：|
回声“🚀开始部署......”
PNPM wrangler deploy -c wrangler-action.toml 2>&1 \
|发球deploy.log \
|grep -v “https://.*\.workers\.dev” \
|sed -E 's/env\.domain .*/env.domain （***）/' \
||确实如此
          
DEPLOY_EXIT_CODE=${PIPESTATUS[0]}
如果 [ $DEPLOY_EXIT_CODE -ne 0 ];则
出口1
Fi
          
WORKER_URL=$（grep -o “https://.*\.workers\.dev” deploy.log || echo “”）
          
如果 [ -n “$WORKER_URL” ];则
echo “：：add-mask：：$WORKER_URL”
Fi
          
echo “worker_url=$WORKER_URL” >> $GITHUB_输出
回声“✅设置完成。”
      - name： ♻️ 初始化数据库 / Initialize database
        运行：|
回声“🛠️开始数据库初始化......”
睡15
          
WORKER_URL=“${CUSTOM_DOMAIN：+https：//$CUSTOM_DOMAIN}”
WORKER_URL=“${WORKER_URL：-${{ steps.deploy.outputs.worker_url }}}”
          
如果 [ -z “$WORKER_URL” ];则
echo “❌预览URL不可用。请设置CUSTOM_DOMAIN。”
出口1
Fi
          
HTTP_CODE=$（curl -sL -w “%{http_code}” -o response.txt “$WORKER_URL/api/init/${JWT_SECRET}”）
RESPONSE_BODY=$（猫response.txt）
如果 [ “$RESPONSE_BODY” = “成功”];则
回声“✅设置完成。”
否则
回声：“❌失败了。HTTP： $HTTP_CODE，响应：$RESPONSE_BODY”
出口1
Fi
      - name： 🗑️ 删除运行记录 / 删除工作流程运行
        用途：GitRML/delete-workflow-runs@main
        继续错误：真
        与：
          retain_days：“1”
          keep_minimum_runs：“0”
